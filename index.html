<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MAHJONG WAYS 2 - WD AUTO FILL</title>

<style>
body {
  margin: 0;
  padding: 18px;
  overflow-x: hidden;
  position: relative;
  font-family: Arial, Helvetica, sans-serif;
  color: #fff;
}

#bg-video {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
  width: auto;
  height: auto;
  z-index: -100;
  object-fit: cover;
  filter: brightness(1.35) contrast(1.18) saturate(1.15);
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  z-index: -99;
  pointer-events: none;
}

:root{
  --panel:rgba(0,0,0,0.18);
  --text:#fff;
  --muted:#aaa;
  --success:#2ecc71;
}

*{box-sizing:border-box}

body.light {
  --panel:rgba(255,255,255,0.75);
  --text:#111;
  --muted:#666;
  --success:#1e8f3e;
  color:#111;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,.08), transparent 25%),
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.05), transparent 25%);
  animation:bgMove 15s linear infinite alternate;
  pointer-events:none;
  z-index:-98;
}

@keyframes bgMove{
  from{transform:translate(-50px,-30px)}
  to{transform:translate(50px,30px)}
}

.container{
  max-width:980px;
  margin:0 auto;
  position:relative;
  z-index:1;
}

.title-glow{
  margin:10px 0 12px;
  text-align:center;
  font-size:24px;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 10px #FFD700,
    0 0 20px #FFD700,
    0 0 35px #FFC300;
}

textarea#data{
  width:100%;
  min-height:220px;
  background:var(--panel);
  color:var(--text);
  border:1px solid rgba(255,255,255,0.12);
  padding:12px;
  border-radius:12px;
  font-size:14px;
  resize:vertical;
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
}

.controls{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}

.btn{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.12);
  color:var(--text);
  padding:10px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  min-width:120px;
  text-align:center;
}

.btn:hover{
  background:rgba(255,215,0,0.12);
}

.btn.small{
  min-width:70px;
  padding:8px 10px;
}

.total{
  margin-top:16px;
  text-align:center;
  font-size:20px;
  padding:14px;
  background:var(--panel);
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(2px);
}

.table-wrap{
  margin-top:18px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--panel);
  border-radius:10px;
  overflow:hidden;
  backdrop-filter:blur(2px);
}

th,td{
  padding:10px 8px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:13px;
  text-align:center;
}

th{
  color:var(--muted);
  font-weight:600;
}

input.cell{
  width:100%;
  padding:8px;
  border:1px solid rgba(255,255,255,0.08);
  background:transparent;
  color:var(--text);
  border-radius:6px;
  text-align:center;
}

.log{
  margin-top:14px;
  background:var(--panel);
  color:var(--muted);
  padding:10px;
  border-radius:10px;
  font-size:13px;
  height:120px;
  overflow:auto;
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(2px);
}

.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  padding:10px 14px;
  border-radius:8px;
  background:var(--success);
  color:#fff;
  font-weight:600;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
  opacity:0;
  transform:translateY(10px);
  transition:all .28s;
  pointer-events:none;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.row-right{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-end;
  margin-top:8px;
}

.switch{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:13px;
}

.switch input{
  width:16px;
  height:16px;
}

/* PREMIUM PARTICLES */
.particle{
  position:fixed;
  top:-30px;
  border-radius:50%;
  pointer-events:none;
  z-index:4;
  animation:fall linear infinite;
}

.snow{
  background:#fff;
  box-shadow:
    0 0 5px rgba(255,255,255,.8),
    0 0 10px rgba(255,255,255,.5),
    0 0 15px rgba(255,255,255,.3);
}

.gold{
  background:#FFD700;
  box-shadow:
    0 0 6px #FFD700,
    0 0 12px #FFC300,
    0 0 18px rgba(255,215,0,.8);
}

@keyframes fall{
  0%{
    transform:translateY(-30px) translateX(0);
    opacity:0;
  }
  10%{
    opacity:1;
  }
  50%{
    transform:translateY(50vh) translateX(30px);
  }
  100%{
    transform:translateY(110vh) translateX(80px);
    opacity:0;
  }
}

@media (max-width:640px){
  .controls{flex-direction:column}
  .btn{width:100%}
  .row-right{justify-content:space-between}
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
  <source src="https://v1.pinimg.com/videos/iht/expMp4/6a/17/4c/6a174c4b135f12065465978c5a552fad_720w.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
  <h1 class="title-glow">🀄 MAHJONG WAYS 2</h1>

  <textarea id="data" placeholder="Tempel semua riwayat di sini"></textarea>

  <div class="controls">
    <button class="btn" id="btn-hitung">Hitung & Isi Tabel</button>
    <button class="btn" id="btn-copy">Copy tanpa Header</button>
    <button class="btn" id="btn-copy-hdr">Copy + Header</button>
    <button class="btn" id="btn-export">Export .xlsx</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>

  <div class="row-right">
    <label class="switch"><input type="checkbox" id="toggle-rupiah" checked> Tampilkan Rupiah</label>
    <label class="switch"><input type="checkbox" id="toggle-mode"> Light Mode</label>
  </div>

  <div class="total" id="hasil">TOTAL KEMENANGAN: IDR 0</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>USER ID</th>
          <th>NAMA REKENING</th>
          <th>NOMOR REKENING</th>
          <th>PERMAINAN</th>
          <th>KODE TICKET</th>
          <th>TOTAL KEMENANGAN</th>
          <th>DEBIT</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input class="cell" id="userid" readonly></td>
          <td><input class="cell" id="namarek" placeholder="Nama sesuai rekening"></td>
          <td><input class="cell" id="norek" placeholder="Nomor rekening"></td>
          <td><input class="cell" id="game" value="Mahjong Ways 2" readonly></td>
          <td><input class="cell" id="kodeticket" readonly></td>
          <td><input class="cell" id="totalkemenangan" readonly></td>
          <td><input class="cell" id="debit" readonly></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div style="display:flex;gap:8px;margin-top:10px">
    <button class="btn small" id="btn-log-clear">Clear Log</button>
    <div style="flex:1"></div>
  </div>

  <div class="log" id="log">Log perhitungan akan muncul di sini...</div>
</div>

<div id="toast" class="toast">Success</div>

<script>
function formatRupiah(n){
  if(n===""||n==null) return "";
  const num = Number(String(n).replace(/[^0-9\-]/g,"")) || 0;
  return "IDR " + num.toLocaleString('id-ID');
}

function onlyDigits(n){
  if(!n) return "";
  return String(n).replace(/[^0-9]/g,"");
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function appendLog(txt){
  const lg = document.getElementById('log');
  const time = new Date().toLocaleString();
  lg.textContent = `[${time}] ${txt}\n` + lg.textContent;
}

const btnHitung = document.getElementById('btn-hitung');
const btnCopy = document.getElementById('btn-copy');
const btnCopyHdr = document.getElementById('btn-copy-hdr');
const btnExport = document.getElementById('btn-export');
const btnReset = document.getElementById('btn-reset');
const dataArea = document.getElementById('data');

const inUser = document.getElementById('userid');
const inNama = document.getElementById('namarek');
const inNo = document.getElementById('norek');
const inGame = document.getElementById('game');
const inTicket = document.getElementById('kodeticket');
const inTotal = document.getElementById('totalkemenangan');
const inDebit = document.getElementById('debit');
const outTotal = document.getElementById('hasil');

const toggleRupiah = document.getElementById('toggle-rupiah');
const toggleMode = document.getElementById('toggle-mode');
const btnLogClear = document.getElementById('btn-log-clear');

/* PREMIUM SNOW + GOLD */
(function(){
  const snowCount = 70;
  const goldCount = 25;

  function createParticle(type){
    const particle = document.createElement("div");
    particle.className = "particle " + type;

    const size = type === "gold"
      ? Math.random()*4 + 1
      : Math.random()*5 + 2;

    particle.style.width = size + "px";
    particle.style.height = size + "px";
    particle.style.left = Math.random()*100 + "vw";
    particle.style.animationDuration = (8 + Math.random()*12) + "s";
    particle.style.animationDelay = Math.random()*10 + "s";

    document.body.appendChild(particle);
  }

  for(let i=0;i<snowCount;i++) createParticle("snow");
  for(let i=0;i<goldCount;i++) createParticle("gold");
})();

function autoFillFromText(text){
  if(!text) return;

  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);

  for(const l of lines){
    if(/Nama[:\-]/i.test(l)){
      const m = l.split(/[:\-]/).slice(1).join(":").trim();
      if(m){
        inNama.value = m;
        appendLog('Auto-detected nama dari riwayat');
        break;
      }
    }
  }

  if(!inNama.value){
    for(const l of lines){
      if(/[A-Za-z][\sA-Za-z]+/.test(l) && !/IDR|Credit|Debit|Ext|ID/i.test(l) && l.length>3){
        inNama.value = l.split(/\s{2,}/)[0];
        appendLog('Auto-detected probable name');
        break;
      }
    }
  }

  for(const l of lines){
    const m = l.match(/([0-9]{6,20})/);
    if(m){
      inNo.value = m[1];
      appendLog('Auto-detected nomor rekening');
      break;
    }
  }

  for(const l of lines){
    let mm = l.match(/Ext\.?\s*ID\s*[:\-]?\s*([A-Za-z0-9\-]+)/i);
    if(mm){
      inTicket.value = mm[1];
      appendLog('Auto-detected ticket');
      break;
    }
  }
}

function hitungSemua(){
  const teks = dataArea.value || "";

  if(!teks.trim()){
    alert('Tempel dulu riwayatnya!');
    return;
  }

  autoFillFromText(teks);

  const lines = teks.split(/\r?\n/);
  let credit = 0;
  let debit = 0;
  let lastTicket = '';
  let userID = '';

  for(let i=0;i<lines.length;i++){
    const b = lines[i].trim();
    if(!b) continue;

    if(/^[a-zA-Z0-9_]{4,20}$/.test(b) && !/IDR|Credit|Debit|Ext/i.test(b)){
      userID = b;
    }

    const t = b.match(/Ext\.?\s*ID\s*[:\-]?\s*([A-Za-z0-9\-]+)/i);
    if(t) lastTicket = t[1];

    if(/CreditIDR/i.test(b)){
      credit += Number(b.replace(/[^0-9]/g,'') || 0);
    } else if(/^IDR\s*\d+/i.test(b) && !/Debit/i.test(b)){
      credit += Number(b.replace(/[^0-9]/g,'') || 0);
    }

    if(/DebitIDR/i.test(b)){
      debit += Number(b.replace(/[^0-9]/g,'') || 0);
    } else if(/Debit/i.test(b) && lines[i+1] && /^IDR\s*\d+/i.test(lines[i+1])){
      debit += Number(lines[i+1].replace(/[^0-9]/g,'') || 0);
    }
  }

  if(!userID) userID = 'riman988';

  const bersih = credit - debit;

  inUser.value = userID;
  if(!inTicket.value) inTicket.value = lastTicket || '-';

  if(toggleRupiah.checked){
    inTotal.value = formatRupiah(bersih);
    inDebit.value = formatRupiah(debit);
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + formatRupiah(bersih);
  } else {
    inTotal.value = String(bersih);
    inDebit.value = String(debit);
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + String(bersih);
  }

  appendLog(`Hitung: user=${userID} total=${bersih} debit=${debit}`);
  showToast('Perhitungan Selesai');
}

function copyWithoutHeader(){
  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].join('\t');

  fallbackCopyTextToClipboard(row);
  appendLog('Copied data tanpa header');
  showToast('Copied');
}

function copyWithHeader(){
  const header = [
    "USER ID",
    "NAMA REKENING",
    "NOMOR REKENING",
    "PERMAINAN",
    "KODE TICKET",
    "TOTAL KEMENANGAN",
    "DEBIT"
  ].join('\t');

  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].join('\t');

  fallbackCopyTextToClipboard(header + '\n' + row);
  appendLog('Copied data + header');
  showToast('Copied + Header');
}

function fallbackCopyTextToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>copyFallback(text));
  } else {
    copyFallback(text);
  }
}

function copyFallback(text){
  const t = document.createElement('textarea');
  t.value = text;
  t.style.position = 'fixed';
  t.style.left = '-9999px';
  document.body.appendChild(t);
  t.focus();
  t.select();
  document.execCommand('copy');
  document.body.removeChild(t);
}

function exportXLSX(){
  const header = [
    "USER ID",
    "NAMA REKENING",
    "NOMOR REKENING",
    "PERMAINAN",
    "KODE TICKET",
    "TOTAL KEMENANGAN",
    "DEBIT"
  ].join(',');

  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].map(c => `"${String(c).replace(/"/g,'""')}"`).join(',');

  const csvContent = header + "\n" + row;
  const blob = new Blob([csvContent], { type:'text/csv;charset=utf-8;' });

  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);

  link.href = url;
  link.download = 'DATA-WD.xlsx';

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  appendLog('Exported to DATA-WD.xlsx');
  showToast('Download dimulai');
}

function resetAll(){
  dataArea.value = '';
  inUser.value = '';
  inNama.value = '';
  inNo.value = '';
  inTicket.value = '';
  inTotal.value = '';
  inDebit.value = '';
  outTotal.innerHTML = 'TOTAL KEMENANGAN: IDR 0';

  appendLog('Form reset');
  showToast('Reset done');
}

toggleRupiah.addEventListener('change', ()=>{
  if(!inTotal.value) return;

  if(toggleRupiah.checked){
    inTotal.value = formatRupiah(onlyDigits(inTotal.value));
    inDebit.value = formatRupiah(onlyDigits(inDebit.value));
  } else {
    inTotal.value = onlyDigits(inTotal.value);
    inDebit.value = onlyDigits(inDebit.value);
  }
});

toggleMode.addEventListener('change', ()=>{
  document.body.classList.toggle('light', toggleMode.checked);
});

btnHitung.addEventListener('click', hitungSemua);
btnCopy.addEventListener('click', copyWithoutHeader);
btnCopyHdr.addEventListener('click', copyWithHeader);
btnExport.addEventListener('click', exportXLSX);

btnReset.addEventListener('click', ()=>{
  if(confirm('Reset semua data?')) resetAll();
});

btnLogClear.addEventListener('click', ()=>{
  document.getElementById('log').textContent = '';
  showToast('Log cleared');
});

dataArea.addEventListener('keydown', (e)=>{
  if(e.ctrlKey && e.key === 'Enter'){
    hitungSemua();
  }
});

appendLog('Tool siap. Tekan Hitung setelah paste riwayat. Ctrl+Enter juga bisa.');


document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.key.toLowerCase() === 'u'){
    e.preventDefault();
    window.location.href = "https://i.pinimg.com/564x/54/2d/7d/542d7d59a38656c67899e291893a6732.jpg";
  }
});


document.addEventListener('keydown', function(e){
  if(e.key === 'F12'){
    e.preventDefault();
    window.location.href = "https://i.pinimg.com/564x/54/2d/7d/542d7d59a38656c67899e291893a6732.jpg";
  }
});

</script>

</body>
</html>
