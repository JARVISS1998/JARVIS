<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAHJONG WAYS 2 - WD AUTO FILL PREMIUM</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

:root{
  --panel:rgba(0,0,0,0.42);
  --panel2:rgba(0,0,0,0.58);
  --text:#ffffff;
  --muted:#d6d6d6;
  --gold:#ffd700;
  --gold2:#ffb300;
  --green:#2ecc71;
  --border:rgba(255,215,0,.28);
}

body{
  min-height:100vh;
  padding:18px;
  color:var(--text);
  overflow-x:hidden;
  position:relative;
  background:#000;
}

/* VIDEO BACKGROUND FULL SCREEN */
#bg-video{
  position:fixed;
  top:50%;
  left:50%;
  min-width:100%;
  min-height:100%;
  width:auto;
  height:auto;
  transform:translate(-50%, -50%);
  object-fit:cover;
  z-index:-100;
  filter:
    brightness(1.25)
    contrast(1.18)
    saturate(1.25);
}

/* OVERLAY PREMIUM */
.overlay{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(255,215,0,.12), transparent 36%),
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.08), transparent 25%),
    linear-gradient(rgba(0,0,0,.30), rgba(0,0,0,.72));
  z-index:-99;
  pointer-events:none;
}

/* EFEK GERAK BACKGROUND */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,215,0,.10), transparent 25%),
    radial-gradient(circle at 85% 75%, rgba(255,255,255,.08), transparent 25%);
  animation:bgMove 14s linear infinite alternate;
  pointer-events:none;
  z-index:-98;
}

@keyframes bgMove{
  from{transform:translate(-45px,-25px);}
  to{transform:translate(45px,25px);}
}

/* LIGHT MODE */
body.light{
  --panel:rgba(255,255,255,.78);
  --panel2:rgba(255,255,255,.88);
  --text:#111;
  --muted:#555;
  --border:rgba(255,180,0,.55);
  color:#111;
}

/* CONTAINER */
.container{
  max-width:980px;
  margin:0 auto;
  position:relative;
  z-index:5;
}

/* TITLE BERGERAK */
.marquee-title{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  margin:8px 0 16px;
  border-radius:18px;
  background:linear-gradient(90deg, rgba(0,0,0,.15), rgba(255,215,0,.12), rgba(0,0,0,.15));
  border:1px solid rgba(255,215,0,.25);
  padding:12px 0;
  box-shadow:
    0 0 18px rgba(255,215,0,.25),
    inset 0 0 18px rgba(255,215,0,.08);
  backdrop-filter:blur(4px);
}

.title-glow{
  display:inline-block;
  font-size:28px;
  letter-spacing:2px;
  color:#fff;
  text-transform:uppercase;
  text-shadow:
    0 0 8px #fff,
    0 0 14px #ffd700,
    0 0 28px #ffd700,
    0 0 45px #ffae00;
  animation:jalanKananKiri 9s linear infinite;
}

@keyframes jalanKananKiri{
  0%{transform:translateX(100vw);}
  100%{transform:translateX(-100%);}
}

/* TEXTAREA */
textarea#data{
  width:100%;
  min-height:220px;
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--border);
  padding:14px;
  border-radius:16px;
  font-size:14px;
  resize:vertical;
  outline:none;
  box-shadow:
    0 0 22px rgba(0,0,0,.35),
    inset 0 0 18px rgba(255,215,0,.05);
  backdrop-filter:blur(5px);
}

textarea#data::placeholder{
  color:rgba(255,255,255,.72);
}

body.light textarea#data::placeholder{
  color:#555;
}

/* BUTTON */
.controls{
  display:flex;
  gap:10px;
  margin-top:14px;
  flex-wrap:wrap;
}

.btn{
  background:linear-gradient(180deg, rgba(255,215,0,.18), rgba(0,0,0,.38));
  border:1px solid rgba(255,215,0,.38);
  color:var(--text);
  padding:11px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  min-width:130px;
  text-align:center;
  font-weight:700;
  letter-spacing:.3px;
  box-shadow:
    0 0 14px rgba(255,215,0,.16),
    inset 0 0 12px rgba(255,255,255,.04);
  transition:.25s;
  backdrop-filter:blur(4px);
}

.btn:hover{
  transform:translateY(-2px);
  background:linear-gradient(180deg, rgba(255,215,0,.36), rgba(0,0,0,.48));
  box-shadow:
    0 0 20px rgba(255,215,0,.35),
    inset 0 0 12px rgba(255,255,255,.07);
}

.btn.small{
  min-width:80px;
  padding:9px 12px;
}

/* SWITCH */
.row-right{
  display:flex;
  gap:12px;
  align-items:center;
  justify-content:flex-end;
  margin-top:12px;
  flex-wrap:wrap;
}

.switch{
  display:flex;
  align-items:center;
  gap:8px;
  color:var(--muted);
  font-size:13px;
  background:var(--panel);
  border:1px solid rgba(255,255,255,.12);
  padding:8px 10px;
  border-radius:10px;
  backdrop-filter:blur(3px);
}

.switch input{
  width:16px;
  height:16px;
}

/* TOTAL */
.total{
  margin-top:18px;
  text-align:center;
  font-size:22px;
  font-weight:900;
  letter-spacing:.5px;
  padding:16px;
  background:linear-gradient(180deg, rgba(0,0,0,.58), rgba(0,0,0,.34));
  border-radius:16px;
  border:1px solid var(--border);
  color:#fff;
  text-shadow:
    0 0 10px #ffd700,
    0 0 22px rgba(255,215,0,.75);
  box-shadow:
    0 0 24px rgba(255,215,0,.22),
    inset 0 0 18px rgba(255,215,0,.08);
  backdrop-filter:blur(4px);
}

/* TABLE */
.table-wrap{
  margin-top:18px;
  overflow:auto;
  border-radius:16px;
  box-shadow:0 0 24px rgba(0,0,0,.35);
}

table{
  width:100%;
  border-collapse:collapse;
  background:var(--panel2);
  overflow:hidden;
  backdrop-filter:blur(5px);
}

th,td{
  padding:11px 8px;
  border-bottom:1px solid rgba(255,255,255,.10);
  font-size:13px;
  text-align:center;
}

th{
  color:#ffd700;
  font-weight:800;
  text-shadow:0 0 10px rgba(255,215,0,.55);
  background:rgba(0,0,0,.26);
}

input.cell{
  width:100%;
  padding:9px;
  border:1px solid rgba(255,215,0,.22);
  background:rgba(0,0,0,.25);
  color:var(--text);
  border-radius:8px;
  text-align:center;
  outline:none;
}

body.light input.cell{
  background:rgba(255,255,255,.55);
}

/* LOG */
.log{
  margin-top:14px;
  background:var(--panel);
  color:var(--muted);
  padding:12px;
  border-radius:14px;
  font-size:13px;
  height:125px;
  overflow:auto;
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(4px);
}

/* TOAST */
.toast{
  position:fixed;
  right:18px;
  bottom:18px;
  padding:12px 16px;
  border-radius:10px;
  background:linear-gradient(135deg, #20bf55, #01baef);
  color:#fff;
  font-weight:800;
  box-shadow:0 8px 22px rgba(0,0,0,.42);
  opacity:0;
  transform:translateY(12px);
  transition:all .28s;
  pointer-events:none;
  z-index:9999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

/* PARTICLES */
.particle{
  position:fixed;
  top:-30px;
  border-radius:50%;
  pointer-events:none;
  z-index:4;
  animation:fall linear infinite;
}

.snow{
  background:#fff;
  box-shadow:
    0 0 5px rgba(255,255,255,.8),
    0 0 10px rgba(255,255,255,.5),
    0 0 15px rgba(255,255,255,.3);
}

.gold{
  background:#ffd700;
  box-shadow:
    0 0 6px #ffd700,
    0 0 12px #ffc300,
    0 0 18px rgba(255,215,0,.8);
}

@keyframes fall{
  0%{
    transform:translateY(-30px) translateX(0);
    opacity:0;
  }
  10%{opacity:1;}
  50%{transform:translateY(50vh) translateX(35px);}
  100%{
    transform:translateY(110vh) translateX(85px);
    opacity:0;
  }
}

/* MOBILE */
@media(max-width:640px){
  body{
    padding:12px;
  }

  .controls{
    flex-direction:column;
  }

  .btn{
    width:100%;
  }

  .row-right{
    justify-content:space-between;
  }

  .title-glow{
    font-size:22px;
  }

  .total{
    font-size:18px;
  }

  th,td{
    font-size:12px;
    padding:9px 6px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO MP4 -->
<video autoplay muted loop playsinline id="bg-video">
  <source src="https://v1.pinimg.com/videos/iht/expMp4/a8/a0/85/a8a085d71db3cd6950e16e5f0b2d32a7_720w.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <div class="marquee-title">
    <h1 class="title-glow">🀄 MAHJONG WAYS 2</h1>
  </div>

  <textarea id="data" placeholder="Tempel semua riwayat di sini..."></textarea>

  <div class="controls">
    <button class="btn" id="btn-hitung">Hitung & Isi Tabel</button>
    <button class="btn" id="btn-copy">Copy tanpa Header</button>
    <button class="btn" id="btn-copy-hdr">Copy + Header</button>
    <button class="btn" id="btn-export">Export .CSV</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>

  <div class="row-right">
    <label class="switch">
      <input type="checkbox" id="toggle-rupiah" checked>
      Tampilkan Rupiah
    </label>

    <label class="switch">
      <input type="checkbox" id="toggle-mode">
      Light Mode
    </label>
  </div>

  <div class="total" id="hasil">TOTAL KEMENANGAN: IDR 0</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>USER ID</th>
          <th>NAMA REKENING</th>
          <th>NOMOR REKENING</th>
          <th>PERMAINAN</th>
          <th>KODE TICKET</th>
          <th>TOTAL KEMENANGAN</th>
          <th>DEBIT</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td><input class="cell" id="userid" readonly></td>
          <td><input class="cell" id="namarek" placeholder="Nama rekening"></td>
          <td><input class="cell" id="norek" placeholder="Nomor rekening"></td>
          <td><input class="cell" id="game" value="Mahjong Ways 2" readonly></td>
          <td><input class="cell" id="kodeticket" readonly></td>
          <td><input class="cell" id="totalkemenangan" readonly></td>
          <td><input class="cell" id="debit" readonly></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn small" id="btn-log-clear">Clear Log</button>
    <div style="flex:1"></div>
  </div>

  <div class="log" id="log">Log perhitungan akan muncul di sini...</div>

</div>

<div id="toast" class="toast">Success</div>

<script>
function formatRupiah(n){
  if(n === "" || n == null) return "";
  const num = Number(String(n).replace(/[^0-9\-]/g,"")) || 0;
  return "IDR " + num.toLocaleString("id-ID");
}

function onlyDigits(n){
  if(!n) return "";
  return String(n).replace(/[^0-9]/g,"");
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function appendLog(txt){
  const lg = document.getElementById("log");
  const time = new Date().toLocaleString();
  lg.textContent = "[" + time + "] " + txt + "\n" + lg.textContent;
}

const btnHitung = document.getElementById("btn-hitung");
const btnCopy = document.getElementById("btn-copy");
const btnCopyHdr = document.getElementById("btn-copy-hdr");
const btnExport = document.getElementById("btn-export");
const btnReset = document.getElementById("btn-reset");
const dataArea = document.getElementById("data");

const inUser = document.getElementById("userid");
const inNama = document.getElementById("namarek");
const inNo = document.getElementById("norek");
const inGame = document.getElementById("game");
const inTicket = document.getElementById("kodeticket");
const inTotal = document.getElementById("totalkemenangan");
const inDebit = document.getElementById("debit");
const outTotal = document.getElementById("hasil");

const toggleRupiah = document.getElementById("toggle-rupiah");
const toggleMode = document.getElementById("toggle-mode");
const btnLogClear = document.getElementById("btn-log-clear");

/* PARTICLE PREMIUM */
(function(){
  const snowCount = 70;
  const goldCount = 28;

  function createParticle(type){
    const particle = document.createElement("div");
    particle.className = "particle " + type;

    const size = type === "gold"
      ? Math.random() * 4 + 1
      : Math.random() * 5 + 2;

    particle.style.width = size + "px";
    particle.style.height = size + "px";
    particle.style.left = Math.random() * 100 + "vw";
    particle.style.animationDuration = (8 + Math.random() * 12) + "s";
    particle.style.animationDelay = Math.random() * 10 + "s";

    document.body.appendChild(particle);
  }

  for(let i = 0; i < snowCount; i++) createParticle("snow");
  for(let i = 0; i < goldCount; i++) createParticle("gold");
})();

function autoFillFromText(text){
  if(!text) return;

  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

  for(const l of lines){
    if(/Nama[:\-]/i.test(l)){
      const m = l.split(/[:\-]/).slice(1).join(":").trim();
      if(m){
        inNama.value = m;
        appendLog("Auto-detected nama dari riwayat");
        break;
      }
    }
  }

  if(!inNama.value){
    for(const l of lines){
      if(/[A-Za-z][\sA-Za-z]+/.test(l) && !/IDR|Credit|Debit|Ext|ID/i.test(l) && l.length > 3){
        inNama.value = l.split(/\s{2,}/)[0];
        appendLog("Auto-detected probable name");
        break;
      }
    }
  }

  for(const l of lines){
    const m = l.match(/([0-9]{6,20})/);
    if(m){
      inNo.value = m[1];
      appendLog("Auto-detected nomor rekening");
      break;
    }
  }

  for(const l of lines){
    let mm = l.match(/Ext\.?\s*ID\s*[:\-]?\s*([A-Za-z0-9\-]+)/i);
    if(mm){
      inTicket.value = mm[1];
      appendLog("Auto-detected ticket");
      break;
    }
  }
}

function detectTicket(text){
  const matches = [...text.matchAll(/Ext\.?\s*ID\s*:\s*(?:CR|DB)?\d{16,20}-(\d{16,20})/gi)];

  if(matches.length){
    const tickets = [...new Set(matches.map(m => m[1]))];
    inTicket.value = tickets[0];
    appendLog("Auto-detected kode ticket: " + tickets[0]);
  }
}

function hitungSemua(){
  const teks = dataArea.value || "";

  if(!teks.trim()){
    alert("Tempel dulu riwayatnya!");
    return;
  }

  autoFillFromText(teks);
  detectTicket(teks);

  const lines = teks.split(/\r?\n/);
  let credit = 0;
  let debit = 0;
  let lastTicket = "";
  let userID = "";

  for(let i = 0; i < lines.length; i++){
    const b = lines[i].trim();
    if(!b) continue;

    if(/^[a-zA-Z0-9_]{4,20}$/.test(b) && !/IDR|Credit|Debit|Ext/i.test(b)){
      userID = b;
    }

    const t = b.match(/Ext\.?\s*ID\s*[:\-]?\s*([A-Za-z0-9\-]+)/i);
    if(t) lastTicket = t[1];

    if(/CreditIDR/i.test(b)){
      credit += Number(b.replace(/[^0-9]/g,"") || 0);
    } else if(/^IDR\s*\d+/i.test(b) && !/Debit/i.test(b)){
      credit += Number(b.replace(/[^0-9]/g,"") || 0);
    }

    if(/DebitIDR/i.test(b)){
      debit += Number(b.replace(/[^0-9]/g,"") || 0);
    } else if(/Debit/i.test(b) && lines[i + 1] && /^IDR\s*\d+/i.test(lines[i + 1])){
      debit += Number(lines[i + 1].replace(/[^0-9]/g,"") || 0);
    }
  }

  if(!userID) userID = "riman988";

  const bersih = credit - debit;

  inUser.value = userID;
  if(!inTicket.value) inTicket.value = lastTicket || "-";

  if(toggleRupiah.checked){
    inTotal.value = formatRupiah(bersih);
    inDebit.value = formatRupiah(debit);
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + formatRupiah(bersih);
  } else {
    inTotal.value = String(bersih);
    inDebit.value = String(debit);
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + String(bersih);
  }

  appendLog("Hitung selesai: user=" + userID + " total=" + bersih + " debit=" + debit);
  showToast("Perhitungan Selesai");
}

function copyWithoutHeader(){
  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].join("\t");

  fallbackCopyTextToClipboard(row);
  appendLog("Copied data tanpa header");
  showToast("Copied");
}

function copyWithHeader(){
  const header = [
    "USER ID",
    "NAMA REKENING",
    "NOMOR REKENING",
    "PERMAINAN",
    "KODE TICKET",
    "TOTAL KEMENANGAN",
    "DEBIT"
  ].join("\t");

  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].join("\t");

  fallbackCopyTextToClipboard(header + "\n" + row);
  appendLog("Copied data + header");
  showToast("Copied + Header");
}

function fallbackCopyTextToClipboard(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(() => copyFallback(text));
  } else {
    copyFallback(text);
  }
}

function copyFallback(text){
  const t = document.createElement("textarea");
  t.value = text;
  t.style.position = "fixed";
  t.style.left = "-9999px";
  document.body.appendChild(t);
  t.focus();
  t.select();
  document.execCommand("copy");
  document.body.removeChild(t);
}

function exportCSV(){
  const header = [
    "USER ID",
    "NAMA REKENING",
    "NOMOR REKENING",
    "PERMAINAN",
    "KODE TICKET",
    "TOTAL KEMENANGAN",
    "DEBIT"
  ].join(",");

  const row = [
    inUser.value.trim(),
    inNama.value.trim(),
    inNo.value.trim(),
    inGame.value.trim(),
    inTicket.value.trim(),
    onlyDigits(inTotal.value),
    onlyDigits(inDebit.value)
  ].map(c => '"' + String(c).replace(/"/g,'""') + '"').join(",");

  const csvContent = header + "\n" + row;
  const blob = new Blob([csvContent], {type:"text/csv;charset=utf-8;"});

  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);

  link.href = url;
  link.download = "DATA-WD-MAHJONG-WAYS-2.csv";

  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);

  appendLog("Exported to CSV");
  showToast("Download dimulai");
}

function resetAll(){
  dataArea.value = "";
  inUser.value = "";
  inNama.value = "";
  inNo.value = "";
  inTicket.value = "";
  inTotal.value = "";
  inDebit.value = "";
  outTotal.innerHTML = "TOTAL KEMENANGAN: IDR 0";

  appendLog("Form reset");
  showToast("Reset done");
}

toggleRupiah.addEventListener("change", () => {
  if(!inTotal.value) return;

  if(toggleRupiah.checked){
    inTotal.value = formatRupiah(onlyDigits(inTotal.value));
    inDebit.value = formatRupiah(onlyDigits(inDebit.value));
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + inTotal.value;
  } else {
    inTotal.value = onlyDigits(inTotal.value);
    inDebit.value = onlyDigits(inDebit.value);
    outTotal.innerHTML = "TOTAL KEMENANGAN: " + inTotal.value;
  }
});

toggleMode.addEventListener("change", () => {
  document.body.classList.toggle("light", toggleMode.checked);
});

btnHitung.addEventListener("click", hitungSemua);
btnCopy.addEventListener("click", copyWithoutHeader);
btnCopyHdr.addEventListener("click", copyWithHeader);
btnExport.addEventListener("click", exportCSV);

btnReset.addEventListener("click", () => {
  if(confirm("Reset semua data?")) resetAll();
});

btnLogClear.addEventListener("click", () => {
  document.getElementById("log").textContent = "";
  showToast("Log cleared");
});

dataArea.addEventListener("keydown", (e) => {
  if(e.ctrlKey && e.key === "Enter"){
    hitungSemua();
  }
});

appendLog("Tool siap. Paste riwayat lalu tekan Hitung. Bisa juga Ctrl + Enter.");

/* PROTEKSI SEDERHANA */
document.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.key.toLowerCase() === "u"){
    e.preventDefault();
    window.location.href = "https://i.pinimg.com/564x/54/2d/7d/542d7d59a38656c67899e291893a6732.jpg";
  }
});

document.addEventListener("keydown", function(e){
  if(e.key === "F12"){
    e.preventDefault();
    window.location.href = "https://i.pinimg.com/564x/54/2d/7d/542d7d59a38656c67899e291893a6732.jpg";
  }
});
</script>

</body>
</html>
